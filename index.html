<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SocialNest</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            position: absolute;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            color: white;
        }

        .navbar h3 {
            margin: 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }

        /* Hero Section */
        .hero {
            height: 300px;
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 50px;
        }

        /* Content */
        .content {
            text-align: center;
            padding: 40px;
            background-color: #f2f2f2;
        }

        .content h2 {
            font-weight: normal;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <h3>Social Media Website</h3>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- Hero Section -->
    <div class="hero">
        SocialNest
    </div>

    <!-- Tagline -->
    <div class="content">
        <h2>Connect with the world instantly</h2>
    </div>

</body>
</html>
